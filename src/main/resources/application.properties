# Server
server.port=8080
server.servlet.context-path=/project
spring.application.name=SmartCart_E-Commerce


# DATABASE CONNECTION
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql:///kalyan
spring.datasource.username=root
spring.datasource.password=root
# ===============================
# ORACLE DATABASE CONFIGURATION
# ===============================
#
#spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
#spring.datasource.url=jdbc:oracle:thin:@localhost:1521/orcl
#spring.datasource.username=c##class
#spring.datasource.password=class


# ===============================
# JPA / HIBERNATE CONFIG
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional (Spring Boot auto-detects it, but you can keep it)
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect